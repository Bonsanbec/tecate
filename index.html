<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Tecate Simulator | Bonsanbec Developers</title>

    <link rel="icon" type="image/svg+xml" href="https://bonsanbec.dev/favicon.svg" />

    <link rel="stylesheet" href="leaflet-1.9.4/leaflet.css" />
    <script src="leaflet-1.9.4/leaflet.js"></script>
    <script src="MinedMap.js"></script>

    <style>
        :root {
            --bonsanbec-blue: #008cff;
            --background: #0b0f14;
            --panel: rgba(11, 15, 20, 0.88);
            --text: #ffffff;
            --muted: #b9c4d0;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body,
        #map {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body,
        .leaflet-container {
            background: var(--background);
            font-family:
                Inter,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        .leaflet-container a.leaflet-popup-close-button {
            color: #d0d0d0;
        }

        .leaflet-container a.leaflet-popup-close-button:hover {
            color: #ffffff;
        }

        .leaflet-popup-content-wrapper,
        .leaflet-popup-tip {
            background: rgba(20, 24, 31, 0.92);
            color: white;
            border: 1px solid rgba(0, 140, 255, 0.35);
        }

        .overzoomed {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }

        .sign-wrapper {
            padding-left: 4px;
            margin-bottom: 2em;
        }

        .sign-wrapper:last-child {
            margin-bottom: 0;
        }

        .sign-title {
            color: white;
            font-weight: bold;
            margin-bottom: 0.5em;
        }

        .sign-container {
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sign-content {
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
            font-family: sans-serif;
        }

        span.obfuscated:hover {
            background-color: transparent !important;
        }

        .leaflet-top.leaflet-left {
            top: 16px;
            left: auto;
            right: 16px;
        }

        .leaflet-top.leaflet-right {
            top: 72px;
        }

        .leaflet-control-zoom,
        .leaflet-control-layers {
            box-shadow: 0 8px 24px rgba(0,0,0,.35) !important;
        }

        .branding {
            position: fixed;
            top: 72px;
            left: 16px;
            z-index: 2000;

            display: flex;
            align-items: center;
            gap: 12px;

            padding: 12px 16px;

            background: var(--panel);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(0, 140, 255, 0.25);
            border-radius: 14px;

            box-shadow:
                0 0 24px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(0, 140, 255, 0.1);
        }

        .branding img.logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .branding-content {
            display: flex;
            flex-direction: column;
        }

        .branding-title {
            color: var(--text);
            font-weight: 700;
            font-size: 15px;
            line-height: 1.2;
        }

        .branding-subtitle {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.2;
        }

        .project-card {
            position: fixed;
            right: 16px;
            top: 72px;
            z-index: 2000;

            display: flex;
            align-items: center;
            gap: 12px;

            max-width: 340px;

            padding: 12px 16px;

            background: var(--panel);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(0, 140, 255, 0.25);
            border-radius: 14px;
        }

        .project-card img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .project-title {
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .project-description {
            color: var(--muted);
            font-size: 12px;
            margin-top: 2px;
        }

        .footer-badge {
            position: fixed;
            left: 16px;
            bottom: 16px;
            z-index: 2000;

            display: flex;
            flex-direction: column;
            gap: 8px;

            background: rgba(0, 140, 255, 0.95);
            color: white;

            padding: 12px 16px;
            border-radius: 14px;

            font-size: 12px;
            font-weight: 600;

            box-shadow: 0 8px 24px rgba(0, 140, 255, 0.35);
        }

        .footer-badge:hover {
            transform: translateY(-1px);
        }

        .footer-title {
            font-weight: 700;
            font-size: 13px;
        }

        .footer-subtitle {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            color: white;
            text-decoration: none;

            padding: 4px 8px;
            border-radius: 8px;

            background: rgba(255,255,255,0.12);
        }

        .footer-link:hover {
            background: rgba(255,255,255,0.18);
        }

        .footer-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .branding,
            .project-card {
                max-width: calc(100vw - 32px);
            }

            .project-card {
                top: auto;
                bottom: 96px;
            }
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div class="branding">
        <img class="logo" src="static/bonsanbec.png" alt="Bonsanbec Developers" />
        <div class="branding-content">
            <div class="branding-title">Bonsanbec Developers</div>
            <div class="branding-subtitle">
                Visualización geoespacial de Minecraft
            </div>
        </div>
    </div>

    <div class="project-card">
        <img src="static/kuchumá.png" alt="Cuchumá" />
        <div>
            <div class="project-title">Tecate Simulator</div>
            <div class="project-description">
                Reconstrucción colaborativa del municipio de Tecate a escala
                real dentro de Minecraft.
            </div>
        </div>
    </div>

    <div class="footer-badge">
        <div class="footer-title">Únetenos en todos tus dispositivos</div>
        <div class="footer-subtitle">
            <span class="footer-link">
                <img class="footer-icon" src="static/java.svg" alt="Java" />
                Java
            </span>

            <a class="footer-link" href="minecraft://?addExternalServer=Tecate%20Simulator|tecate.bonsanbec.dev">
                <img class="footer-icon" src="static/bedrock.svg" alt="Bedrock" />
                iOS, Android, Windows y consolas
            </a>
        </div>
    </div>

    <div style="position:fixed;left:16px;bottom:88px;z-index:2000;color:#b9c4d0;font-size:12px;background:rgba(11,15,20,.88);padding:8px 12px;border-radius:999px;border:1px solid rgba(0,140,255,.25);backdrop-filter:blur(12px);font-family:monospace;">
        tecate.bonsanbec.dev
    </div>

    <script>
        createMap();
    </script>
</body>
</html>
